<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MysteryLife | Real-Time RTC Radio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=Syncopate:wght@400;700&display=swap');
        
        body {
            background: #050505;
            color: #fff;
            font-family: 'Inter', sans-serif;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            background-image: radial-gradient(circle at center, #1a0808 0%, #050505 100%);
        }

        .orbitron { font-family: 'Syncopate', sans-serif; }

        .radio-frame {
            background: #0d0d0d;
            border: 2px solid #222;
            border-radius: 40px;
            width: 380px;
            padding: 30px;
            box-shadow: 0 0 60px rgba(255, 0, 0, 0.1);
            position: relative;
        }

        .screen {
            background: #000;
            border: 1px solid #1a1a1a;
            border-radius: 15px;
            padding: 15px;
            margin-bottom: 25px;
            min-height: 100px;
        }

        .ptt-outer {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            background: #111;
            border: 8px solid #1a1a1a;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s;
            touch-action: none;
            user-select: none;
        }

        .ptt-outer.active {
            border-color: #ff0000;
            box-shadow: 0 0 40px rgba(255, 0, 0, 0.4);
            transform: scale(0.95);
        }

        .ptt-inner {
            width: 110px;
            height: 110px;
            border-radius: 50%;
            background: linear-gradient(145deg, #151515, #0a0a0a);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #333;
        }

        .ptt-outer.active .ptt-inner {
            background: #ff0000;
            color: #fff;
        }

        .led {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #222;
        }

        .led.active-tx { background: #ff0000; box-shadow: 0 0 10px #ff0000; }
        .led.active-rx { background: #00ff00; box-shadow: 0 0 10px #00ff00; }
    </style>
</head>
<body onclick="enableAudio()">

    <!-- Login Section -->
    <div id="login" class="radio-frame text-center">
        <h1 class="orbitron text-xl font-bold text-red-600 mb-6">MYSTERY RTC</h1>
        <div class="space-y-4">
            <input type="text" id="username" placeholder="CALLSIGN (E.G. ALPHA-1)" class="w-full bg-black border border-zinc-800 p-3 rounded-lg text-center font-bold uppercase outline-none focus:border-red-600 transition-all">
            <input type="number" id="freq" placeholder="FREQUENCY (MHz)" value="101.5" class="w-full bg-black border border-zinc-800 p-3 rounded-lg text-center orbitron text-red-600 font-bold outline-none focus:border-red-600 transition-all">
            <button id="connect" class="w-full bg-red-600 hover:bg-red-700 py-4 rounded-xl font-black text-sm uppercase tracking-widest transition-all active:scale-95">Establish Connection</button>
        </div>
        <p class="text-[9px] text-zinc-600 mt-6 uppercase tracking-widest">Secure Peer-to-Peer Protocol</p>
    </div>

    <!-- Radio Interface Section -->
    <div id="radio" class="radio-frame hidden">
        <div class="flex justify-between items-center mb-4 px-2">
            <div class="flex flex-col items-center gap-1">
                <div class="led" id="tx-led"></div>
                <span class="text-[8px] text-zinc-600 font-bold">TX</span>
            </div>
            <span class="orbitron text-[10px] text-zinc-500 tracking-tighter">ENCRYPTED VOICE LINK</span>
            <div class="flex flex-col items-center gap-1">
                <div class="led" id="rx-led"></div>
                <span class="text-[8px] text-zinc-600 font-bold">RX</span>
            </div>
        </div>

        <div class="screen text-center flex flex-col justify-center">
            <p id="display-freq" class="orbitron text-2xl text-red-600 font-bold mb-1 tracking-wider">000.00</p>
            <p id="display-user" class="text-[10px] font-black text-zinc-500 uppercase tracking-widest">UNIT: ---</p>
            <div id="connection-status" class="text-[9px] text-zinc-400 mt-2 font-mono uppercase tracking-tighter">Initializing...</div>
        </div>

        <div class="flex justify-center mb-8">
            <div id="ptt" class="ptt-outer">
                <div class="ptt-inner">
                    <i class="fa-solid fa-microphone text-2xl mb-1"></i>
                    <span class="text-[8px] font-black orbitron">PUSH TO TALK</span>
                </div>
            </div>
        </div>

        <div class="flex items-center gap-4">
            <i class="fa-solid fa-volume-high text-zinc-700 text-sm"></i>
            <input type="range" id="volume" class="w-full accent-red-600" min="0" max="1" step="0.1" value="1">
            <span class="text-[9px] text-zinc-600 font-bold" id="vol-label">100%</span>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, doc, setDoc, onSnapshot, query, where, deleteDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        // Global Firebase Configuration Handling
        const firebaseConfig = JSON.parse(typeof __firebase_config !== 'undefined' ? __firebase_config : JSON.stringify({
            apiKey: "",
            authDomain: "policerp-a71c8.firebaseapp.com",
            projectId: "policerp-a71c8",
            storageBucket: "policerp-a71c8.firebasestorage.app",
            messagingSenderId: "569720054342",
            appId: "1:569720054342:web:858b7f239f5c35929ca047"
        }));

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : "mystery-rtc-v10-en";

        let localStream, pc, user, myName, myFreq;
        const config = { iceServers: [{ urls: "stun:stun.l.google.com:19302" }] };

        // Helper to enable audio context on user interaction
        window.enableAudio = () => { if (window.audioCtx) window.audioCtx.resume(); };

        // Rule 3: Auth Before Queries
        const initAuth = async () => {
          if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
            await signInWithCustomToken(auth, __initial_auth_token);
          } else {
            await signInAnonymously(auth);
          }
        };
        initAuth();

        onAuthStateChanged(auth, (u) => {
            user = u;
        });

        document.getElementById('connect').onclick = async () => {
            if (!user) {
                console.log("Waiting for auth...");
                return;
            }
            myName = document.getElementById('username').value.trim() || "Unit";
            myFreq = document.getElementById('freq').value.trim();
            
            try {
                localStream = await navigator.mediaDevices.getUserMedia({ 
                    audio: { echoCancellation: true, noiseSuppression: true } 
                });
                localStream.getAudioTracks()[0].enabled = false;

                document.getElementById('login').style.display = 'none';
                document.getElementById('radio').classList.remove('hidden');
                document.getElementById('display-user').textContent = `CALLSIGN: ${myName}`;
                document.getElementById('display-freq').textContent = `${myFreq} MHz`;
                document.getElementById('connection-status').textContent = "Connecting to P2P Node...";

                initRTC();
            } catch (err) {
                alert("Microphone access is required for the tactical radio.");
            }
        };

        async function initRTC() {
            if (!user) return;
            pc = new RTCPeerConnection(config);
            
            localStream.getTracks().forEach(track => pc.addTrack(track, localStream));

            pc.ontrack = (event) => {
                const remoteAudio = new Audio();
                remoteAudio.srcObject = event.streams[0];
                remoteAudio.volume = document.getElementById('volume').value;
                remoteAudio.play();
                
                const rxLed = document.getElementById('rx-led');
                rxLed.classList.add('active-rx');
                document.getElementById('connection-status').textContent = "Receiving Signal...";
                setTimeout(() => rxLed.classList.remove('active-rx'), 5000); 
            };

            pc.onicecandidate = (event) => {
                if (event.candidate && user) {
                    // Correcting Path to follow Rule 1: /artifacts/{appId}/public/data/{collectionName}
                    setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'ice', user.uid), {
                        candidate: event.candidate.toJSON(),
                        freq: myFreq,
                        ts: Date.now()
                    });
                }
            };

            // Rule 1: Using correct path structures for public data
            const signalsColRef = collection(db, 'artifacts', appId, 'public', 'data', 'signals');
            const iceColRef = collection(db, 'artifacts', appId, 'public', 'data', 'ice');

            onSnapshot(query(signalsColRef, where("freq", "==", myFreq)), async (snap) => {
                snap.docChanges().forEach(async change => {
                    const data = change.doc.data();
                    if (change.type === "added" && data.senderId !== user.uid) {
                        if (data.type === "offer") {
                            await pc.setRemoteDescription(new RTCSessionDescription(data.sdp));
                            const answer = await pc.createAnswer();
                            await pc.setLocalDescription(answer);
                            await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'signals', user.uid), {
                                type: "answer", sdp: answer, senderId: user.uid, freq: myFreq, ts: Date.now()
                            });
                        } else if (data.type === "answer") {
                            await pc.setRemoteDescription(new RTCSessionDescription(data.sdp));
                            document.getElementById('connection-status').textContent = "Handshake Complete - Ready";
                        }
                    }
                }, (error) => console.error("Signals Listener Error:", error));
            });

            onSnapshot(query(iceColRef, where("freq", "==", myFreq)), async (snap) => {
                snap.docChanges().forEach(async change => {
                    if (change.type === "added" && change.doc.id !== user.uid) {
                        const data = change.doc.data();
                        await pc.addIceCandidate(new RTCIceCandidate(data.candidate));
                    }
                }, (error) => console.error("ICE Listener Error:", error));
            });

            const offer = await pc.createOffer();
            await pc.setLocalDescription(offer);
            await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'signals', user.uid), {
                type: "offer", sdp: offer, senderId: user.uid, freq: myFreq, ts: Date.now()
            });
        }

        const ptt = document.getElementById('ptt');
        const txLed = document.getElementById('tx-led');

        const toggleMic = (state) => {
            if (localStream) {
                localStream.getAudioTracks()[0].enabled = state;
                if (state) {
                    ptt.classList.add('active');
                    txLed.classList.add('active-tx');
                    document.getElementById('connection-status').textContent = "Broadcasting...";
                } else {
                    ptt.classList.remove('active');
                    txLed.classList.remove('active-tx');
                    document.getElementById('connection-status').textContent = "Standby - Waiting";
                }
            }
        };

        ptt.onmousedown = ptt.ontouchstart = (e) => { e.preventDefault(); toggleMic(true); };
        ptt.onmouseup = ptt.onmouseleave = ptt.ontouchend = () => toggleMic(false);

        document.getElementById('volume').oninput = (e) => {
            document.getElementById('vol-label').textContent = `${Math.round(e.target.value * 100)}%`;
        };

        window.onbeforeunload = () => {
            if (user) {
                deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'signals', user.uid));
                deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'ice', user.uid));
            }
        };
    </script>
</body>
</html>
